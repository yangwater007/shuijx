# yaml-language-server: $schema=https://zeabur.com/schema.json
# Zeabur ???? ? frontend + bridge

services:
  # ======= ?? React + Vite =======
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    port: 80
    resources:
      cpu: 0.25
      memory: 256Mi
    environment:
      # Vite ?????????????
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_DEEPSEEK_API_KEY: ${VITE_DEEPSEEK_API_KEY}
      VITE_WUDAO_API_KEY: ${VITE_WUDAO_API_KEY}
      VITE_BRIDGE_URL: ${VITE_BRIDGE_URL}
      VITE_MCP_URL: ${VITE_MCP_URL}

  # ======= ?? FastAPI Bridge =======
  bridge:
    build:
      context: .
      dockerfile: apps/bridge/Dockerfile
    port: 8000
    resources:
      cpu: 0.5
      memory: 512Mi
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
