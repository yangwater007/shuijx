services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quicktiny-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quicktiny.cn
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - qt-net

networks:
  qt-net:
