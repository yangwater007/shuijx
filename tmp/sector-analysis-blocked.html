  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" href="https://static.quicktiny.cn/favicon.svg?v=3" type="image/svg+xml">
  <link rel="alternate icon" href="https://static.quicktiny.cn/favicon.ico?v=3" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://static.quicktiny.cn/apple-touch-icon.png">
  <link rel="manifest" href="https://static.quicktiny.cn/manifest.json?v=9">
  
  <meta name="description" content="连板天梯实时监控平台，轻松掌握连板个股动态">
  <meta name="theme-color" content="#1a73e8">
  <!-- PWA 触摸优化 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  
  <style>
    /* 提前定义加载动画，避免闪烁 */
    body {
      background-color: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    .loading-spinner {
      border: 4px solid rgba(24, 144, 255, 0.2);
      border-left-color: #1890ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .loading-text {
      color: #5f6368;
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script type="module" crossorigin="" src="https://static.quicktiny.cn/assets/js/index.12272e22.js"></script>
  <link rel="modulepreload" crossorigin="" href="https://static.quicktiny.cn/assets/js/react-vendor.d8659669.js">
  <link rel="modulepreload" crossorigin="" href="https://static.quicktiny.cn/assets/js/antd.029c2191.js">
  <link rel="modulepreload" crossorigin="" href="https://static.quicktiny.cn/assets/js/utils.4b25ac73.js">
  <link rel="modulepreload" crossorigin="" href="https://static.quicktiny.cn/assets/js/charts.16a96266.js">
  <link rel="stylesheet" href="https://static.quicktiny.cn/assets/css/index.2d251e4e.css">
</head>
<body>
  <div id="root">
    <div id="initial-loading" class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">
        正在加载应用...<br>
        <span style="font-size: 12px; color: #999; margin-top: 8px; display: inline-block;">
          首次加载或网络慢时需要等待 3-10 秒
        </span>
      </div>
    </div>
  </div>
  
  <!-- Vite 会自动注入这个入口文件 -->
  
  
  <!-- 注册 Service Worker 用于 PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Service Worker 必须从同源加载，使用相对路径
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('Service Worker 注册成功:', registration.scope);
            
            // 检测 Service Worker 更新
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('发现新的 Service Worker');
              
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // 新的 Service Worker 已安装，提示用户刷新
                  console.log('新版本已准备就绪');
                  // 自动激活新的 Service Worker
                  newWorker.postMessage('skipWaiting');
                }
              });
            });
            
            // 定期检查更新（每5分钟）
            setInterval(() => {
              registration.update().catch(() => {});
            }, 5 * 60 * 1000);
          })
          .catch(error => {
            console.log('Service Worker 注册失败:', error);
          });
        
        // 当 Service Worker 控制权变化时刷新页面
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          console.log('Service Worker 已更新，刷新页面');
          window.location.reload();
        });
      });
    }
  </script>



</body></html>
